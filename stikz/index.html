<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stikz - Browser Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-shell">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div><strong>Score:</strong> <span id="scoreValue">0</span></div>
      <div><strong>Kills:</strong> <span id="killsValue">0</span></div>
      <div><strong>Spear Length:</strong> <span id="spearValue">0</span></div>
    </div>
    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <ol id="leaderboardList"></ol>
    </div>
    <div id="help">WASD to move • Aim with mouse • Touch enemies with spear tip</div>
  </div>

  <script src="utils.js"></script>
  <script src="bots.js"></script>
  <script src="game.js"></script>
</body>
</html>
